name: React Doctor

on:
  pull_request:
    branches: [main]

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for --diff

      - name: React Doctor (PR comment)
        uses: millionco/react-doctor@main
        with:
          diff: main
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: React Doctor (annotations)
        if: always()
        run: npx -y react-doctor@latest . --diff main --annotations --verbose
